apiVersion: apps/v1
kind: Deployment
metadata:
  name: kpop-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kpop-frontend
  template:
    metadata:
      labels:
        app: kpop-frontend
    spec:
      containers:
        - name: frontend
          image: kpop-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: kpop-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081
  type: NodePort